services:
  postgres:
    image: postgres:15
    container_name: portal-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: portal
    ports:
      - "5433:5432"

  redis:
    image: redis:7
    container_name: portal-redis
    ports:
      - "6379:6379"